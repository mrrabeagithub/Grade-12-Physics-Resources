<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Resource Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-3px); border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 15px 30px -10px rgba(0,0,0,0.5); }
        .search-focus:focus-within { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .text-glow { text-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">

    <div class="max-w-5xl mx-auto">
        <!-- Navigation & Search -->
        <div class="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
            <nav class="flex items-center space-x-2 text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">
                <a href="/" id="root-link" class="hover:text-blue-400 transition flex items-center">
                    <i class="fas fa-home mr-2"></i> Portal
                </a>
                <span>/</span>
                <span id="current-crumb" class="text-blue-500">Resources</span>
            </nav>
            
            <div class="glass px-4 py-2 rounded-xl flex items-center space-x-3 search-focus transition-all md:w-64">
                <i class="fas fa-search text-slate-500 text-sm"></i>
                <input type="text" id="search-input" placeholder="Search resources..." class="bg-transparent border-none outline-none text-sm text-white placeholder-slate-600 w-full">
            </div>
        </div>

        <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <div class="flex items-center space-x-3 mb-2">
                    <div class="h-2 w-2 rounded-full bg-blue-500 animate-pulse"></div>
                    <span id="grade-badge" class="text-[10px] font-bold text-blue-500 uppercase tracking-widest tracking-[0.2em] text-glow">Syncing...</span>
                </div>
                <h1 id="folder-name" class="text-4xl md:text-5xl font-black text-white mb-3 italic tracking-tighter">Portal</h1>
                <p id="folder-desc" class="text-slate-400 max-w-xl text-sm leading-relaxed italic">
                    Accessing synchronized high-fidelity simulations and curriculum materials.
                </p>
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="loadResources(true)" class="p-3 glass rounded-xl hover:bg-white/10 transition group" title="Force Refresh">
                    <i class="fas fa-sync-alt text-slate-400 group-active:rotate-180 transition-transform duration-500"></i>
                </button>
                <a href="#" id="source-link" target="_blank" class="glass px-6 py-3 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-white/10 transition flex items-center border-white/5">
                    <i class="fab fa-github mr-2 text-base"></i> Source
                </a>
            </div>
        </header>

        <div id="file-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

        <div id="empty-state" class="hidden text-center py-24 glass rounded-3xl border-dashed border-slate-700">
            <i class="fas fa-folder-open text-4xl text-slate-700 mb-4"></i>
            <h3 id="empty-state-title" class="text-xl font-bold text-slate-500">Ready for Content</h3>
            <p id="empty-state-desc" class="text-slate-600 text-sm mb-8">No resource files detected in this folder yet.</p>
            <div id="debug-info" class="text-[10px] text-slate-400 font-mono bg-black/40 p-5 rounded-2xl inline-block text-left border border-white/10 max-w-full">
                <p class="font-bold text-blue-400 mb-2 uppercase tracking-widest border-b border-white/5 pb-1">Technician Debug Console</p>
                <p id="debug-repo">Repo: Detecting...</p>
                <p id="debug-path">Path: Detecting...</p>
            </div>
        </div>

        <div id="loader" class="text-center py-24">
            <i class="fas fa-atom fa-spin text-5xl text-blue-600"></i>
            <p class="text-xs text-slate-500 mt-4 font-bold uppercase tracking-[0.3em]">Querying GitHub Node...</p>
        </div>

        <div id="error-message" class="hidden glass p-10 rounded-3xl border-red-500/20 text-center">
            <i class="fas fa-exclamation-triangle text-red-500 text-2xl mb-4"></i>
            <h3 class="text-xl font-bold text-white mb-2">Sync Error</h3>
            <p id="error-text" class="text-slate-400 text-sm mb-4"></p>
            <div id="error-debug" class="text-[10px] text-red-400/60 font-mono bg-red-950/20 p-2 rounded inline-block"></div>
        </div>
    </div>

    <script>
        const repoOwner = "mrrabeagithub";
        let allItems = []; 
        let currentRepo = "";

        async function fetchWithRetry(url, options = {}, retries = 3, backoff = 1000) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    if (response.status === 403 || response.status === 429) {
                        if (retries > 0) {
                            await new Promise(resolve => setTimeout(resolve, backoff));
                            return fetchWithRetry(url, options, retries - 1, backoff * 2);
                        }
                    }
                    throw new Error(response.statusText);
                }
                return response;
            } catch (err) {
                if (retries > 0) {
                    await new Promise(resolve => setTimeout(resolve, backoff));
                    return fetchWithRetry(url, options, retries - 1, backoff * 2);
                }
                throw err;
            }
        }

        async function loadResources(force = false) {
            const grid = document.getElementById('file-grid');
            const loader = document.getElementById('loader');
            const errorContainer = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const titleElement = document.getElementById('folder-name');
            const rootLink = document.getElementById('root-link');
            const crumb = document.getElementById('current-crumb');
            const badge = document.getElementById('grade-badge');
            const sourceLink = document.getElementById('source-link');
            const debugRepo = document.getElementById('debug-repo');
            const debugPath = document.getElementById('debug-path');

            grid.innerHTML = '';
            loader.classList.remove('hidden');
            errorContainer.classList.add('hidden');
            document.getElementById('empty-state').classList.add('hidden');

            const pathSegments = window.location.pathname.split('/').filter(s => s && s !== 'index.html');
            const repoSegment = pathSegments.find(s => s.toLowerCase().startsWith('grade-'));
            const repoIndex = repoSegment ? pathSegments.indexOf(repoSegment) : -1;
            
            currentRepo = repoIndex !== -1 ? pathSegments[repoIndex] : "Grade-12-Physics-Resources";
            let segments = repoIndex !== -1 ? pathSegments.slice(repoIndex + 1) : [];
            
            const decodedSegments = segments.map(s => decodeURIComponent(s));
            const currentPath = decodedSegments.join('/');
            const apiPath = decodedSegments.map(s => encodeURIComponent(s)).join('/');
            
            titleElement.innerText = decodedSegments[decodedSegments.length - 1] || 'Class Portal';
            crumb.innerText = titleElement.innerText;
            badge.innerText = currentRepo.replace(/-/g, ' ');
            sourceLink.href = `https://github.com/${repoOwner}/${currentRepo}`;
            debugRepo.innerText = `Target Repo: ${currentRepo}`;
            debugPath.innerText = `Target Path: "${currentPath}"`;

            const depth = segments.length;
            rootLink.href = depth > 0 ? "../".repeat(depth) + "index.html" : "index.html";

            const baseApiUrl = `https://api.github.com/repos/${repoOwner}/${currentRepo}/contents/${apiPath}?ref=main`;
            const cacheKey = `physics_portal_cache_${baseApiUrl}`;

            try {
                if (!force) {
                    const cached = sessionStorage.getItem(cacheKey);
                    if (cached) {
                        const parsed = JSON.parse(cached);
                        if (Date.now() - parsed.timestamp < 300000) {
                            allItems = parsed.data;
                            loader.classList.add('hidden');
                            renderItems(allItems, currentRepo, currentPath);
                            return;
                        }
                    }
                }

                const response = await fetchWithRetry(baseApiUrl + (force ? `&t=${Date.now()}` : ''));
                allItems = await response.json();
                
                sessionStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), data: allItems }));
                loader.classList.add('hidden');
                renderItems(allItems, currentRepo, currentPath);

            } catch (error) {
                loader.classList.add('hidden');
                errorText.innerText = "GitHub API Limit Reached or Path Mismatch. Browsing of cached folders remains active.";
                document.getElementById('error-debug').innerText = `Path: ${currentPath}`;
                errorContainer.classList.remove('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
            }
        }

        function renderItems(items, repo, path) {
            const grid = document.getElementById('file-grid');
            grid.innerHTML = '';
            const visibleItems = items.filter(item => {
                const name = item.name.toLowerCase();
                return !(name === 'index.html' || name === 'readme.md' || name.startsWith('.') || name === 'desktop.ini');
            });

            if (visibleItems.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            visibleItems.sort((a, b) => (a.type === b.type) ? a.name.localeCompare(b.name) : (a.type === 'dir' ? -1 : 1));

            visibleItems.forEach(item => {
                const card = document.createElement('a');
                const ext = item.name.split('.').pop().toLowerCase();
                if (item.type === 'dir') {
                    card.href = `./${item.name}/index.html`;
                } else {
                    card.href = `https://${repoOwner}.github.io/${repo}/${path ? path + '/' : ''}${item.name}`;
                }

                card.target = "_blank";
                card.className = "glass p-6 rounded-2xl flex flex-col justify-between card-hover border border-white/5 group";
                
                let icon = 'fa-file text-slate-500';
                let typeLabel = 'Resource';
                if (item.type === 'dir') { icon = 'fa-folder text-amber-500'; typeLabel = 'Folder'; }
                else if (ext === 'html') { icon = 'fa-play-circle text-emerald-400'; typeLabel = 'Simulation'; }
                else if (ext === 'pdf') { icon = 'fa-file-pdf text-rose-400'; typeLabel = 'PDF'; }

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <i class="fas ${icon} text-2xl"></i>
                            <i class="fas fa-external-link-alt text-[9px] text-slate-600 group-hover:text-white transition"></i>
                        </div>
                        <h4 class="font-bold text-slate-100 group-hover:text-blue-400 transition line-clamp-2 mb-1 text-sm tracking-tight">${decodeURIComponent(item.name).replace(/-/g, ' ')}</h4>
                        <p class="text-[9px] text-slate-500 uppercase tracking-widest font-black">${typeLabel}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.addEventListener('DOMContentLoaded', () => loadResources());
    </script>
</body>
</html>
