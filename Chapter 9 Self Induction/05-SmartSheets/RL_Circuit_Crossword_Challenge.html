<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RL Circuit Crossword Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cell {
            width: 40px;
            height: 40px;
            border: 1px solid #cbd5e1;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1.2rem;
            position: relative;
        }
        .cell-input {
            width: 100%;
            height: 100%;
            outline: none;
            background: transparent;
            text-align: center;
        }
        .cell-number {
            position: absolute;
            top: 2px;
            left: 2px;
            font-size: 0.6rem;
            color: #64748b;
            pointer-events: none;
            line-height: 1;
        }
        .cell-blocked {
            background-color: #1e293b;
            border: 1px solid #1e293b;
        }
        .cell-correct {
            background-color: #dcfce7;
            color: #166534;
        }
        .clue-item:hover {
            background-color: #f1f5f9;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-4 font-sans">

    <div class="max-w-5xl w-full bg-white rounded-xl shadow-lg p-6 border border-slate-200">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">RL Circuit Crossword Challenge</h1>
            <p class="text-slate-500 mt-2">Master the terminology of Self-Induction & Current Evolution</p>
        </header>

        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Game Grid -->
            <div class="flex-1 flex justify-center items-start overflow-auto pb-4">
                <div id="grid-container" class="grid gap-0" style="grid-template-columns: repeat(13, 40px);">
                    <!-- Grid generated by JS -->
                </div>
            </div>

            <!-- Clues -->
            <div class="lg:w-80 flex flex-col gap-6">
                <div>
                    <h3 class="font-bold text-lg text-blue-600 border-b-2 border-blue-100 mb-3 pb-1">Across</h3>
                    <ul id="across-clues" class="space-y-2 text-sm text-slate-700"></ul>
                </div>
                <div>
                    <h3 class="font-bold text-lg text-green-600 border-b-2 border-green-100 mb-3 pb-1">Down</h3>
                    <ul id="down-clues" class="space-y-2 text-sm text-slate-700"></ul>
                </div>
                <div class="mt-4 p-4 bg-slate-100 rounded-lg">
                    <p id="feedback" class="text-center font-medium text-slate-600">Fill in the grid!</p>
                    <button onclick="checkAll()" class="w-full mt-3 bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">Check All Answers</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Updated Dimensions to fit the new layout
        const gridWidth = 13;
        const gridHeight = 11;

        // Perfectly Interlocking Layout 
        const words = [
            { word: 'SOLENOID', x: 8, y: 1, dir: 'down', num: 1, clue: 'A cylindrical coil of wire acting as an electromagnet.' },
            { word: 'LENZ', x: 2, y: 3, dir: 'down', num: 2, clue: 'The law that states induced emf opposes its cause.' },
            { word: 'FLUX', x: 4, y: 3, dir: 'down', num: 3, clue: 'Product of inductance L and current i (Proper ...)' },
            { word: 'DECAY', x: 5, y: 3, dir: 'down', num: 4, clue: 'Discharge phase where i decreases exponentially.' },
            { word: 'STEADY', x: 6, y: 4, dir: 'across', num: 5, clue: 'The state reached after current reaches maximum.' },
            { word: 'INDUCTANCE', x: 1, y: 5, dir: 'across', num: 6, clue: 'Property of a coil to oppose current change.' },
            { word: 'GROWTH', x: 6, y: 6, dir: 'across', num: 7, clue: 'Phase where current reaches 63% of maximum at t=tau.' },
            { word: 'TAU', x: 10, y: 6, dir: 'down', num: 8, clue: 'The characteristic time constant (L/R).' },
            { word: 'HENRY', x: 1, y: 7, dir: 'across', num: 9, clue: 'The SI unit of inductance L.' },
            { word: 'EMF', x: 2, y: 7, dir: 'down', num: 10, clue: 'Self-induced voltage (Abbr.)' }
        ];

        let grid = Array(gridHeight).fill().map(() => Array(gridWidth).fill(null));

        function initGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            
            // Populate grid structure
            words.forEach(w => {
                for (let i = 0; i < w.word.length; i++) {
                    let cx = w.dir === 'across' ? w.x + i : w.x;
                    let cy = w.dir === 'across' ? w.y : w.y + i;
                    
                    if (!grid[cy][cx]) {
                        grid[cy][cx] = { letter: w.word[i], userLetter: '', number: null };
                    }
                    if (i === 0) grid[cy][cx].number = w.num;
                }
            });

            // Render grid
            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    const cellDiv = document.createElement('div');
                    cellDiv.className = 'cell';
                    
                    if (grid[y][x]) {
                        if (grid[y][x].number) {
                            const numSpan = document.createElement('span');
                            numSpan.className = 'cell-number';
                            numSpan.innerText = grid[y][x].number;
                            cellDiv.appendChild(numSpan);
                        }
                        
                        const input = document.createElement('input');
                        input.className = 'cell-input';
                        input.maxLength = 1;
                        input.dataset.x = x;
                        input.dataset.y = y;
                        input.oninput = (e) => {
                            grid[y][x].userLetter = e.target.value.toUpperCase();
                            if(e.target.value) moveNext(x, y);
                        };
                        cellDiv.appendChild(input);
                    } else {
                        cellDiv.classList.add('cell-blocked');
                    }
                    container.appendChild(cellDiv);
                }
            }

            // Render clues
            const acrossUl = document.getElementById('across-clues');
            const downUl = document.getElementById('down-clues');
            words.forEach(w => {
                const li = document.createElement('li');
                li.className = 'clue-item p-1 rounded transition cursor-help';
                li.innerHTML = `<strong>${w.num}.</strong> ${w.clue}`;
                if (w.dir === 'across') acrossUl.appendChild(li);
                else downUl.appendChild(li);
            });
        }

        function moveNext(x, y) {
            // Simple logic to find next cell in a word
            const inputs = Array.from(document.querySelectorAll('.cell-input'));
            const currentIdx = inputs.findIndex(i => i.dataset.x == x && i.dataset.y == y);
            if (currentIdx < inputs.length - 1) {
                inputs[currentIdx + 1].focus();
            }
        }

        function checkAll() {
            let allCorrect = true;
            let countCorrect = 0;
            let totalCells = 0;

            const inputs = document.querySelectorAll('.cell-input');
            inputs.forEach(input => {
                const x = input.dataset.x;
                const y = input.dataset.y;
                totalCells++;
                
                if (grid[y][x].userLetter === grid[y][x].letter) {
                    input.parentElement.classList.add('cell-correct');
                    countCorrect++;
                } else {
                    input.parentElement.classList.remove('cell-correct');
                    if (grid[y][x].userLetter !== '') allCorrect = false;
                }
            });

            const feedback = document.getElementById('feedback');
            if (countCorrect === totalCells) {
                feedback.innerText = "Excellent! You've mastered the RL terminology!";
                feedback.className = "text-center font-bold text-green-600 scale-110 transition-transform";
            } else {
                feedback.innerText = `Keep going! ${countCorrect}/${totalCells} letters correct.`;
                feedback.className = "text-center font-medium text-blue-600";
            }
        }

        window.onload = initGrid;
    </script>
</body>
</html>
