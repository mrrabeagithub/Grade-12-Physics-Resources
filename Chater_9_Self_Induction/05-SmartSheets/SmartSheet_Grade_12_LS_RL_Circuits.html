<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart-Sheet: Self-Induction & RL Circuits</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 500: '#3b82f6', 600: '#2563eb' }
                    }
                }
            }
        }
    </script>

    <!-- MathJax for Physics Formulas -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* Print Styles */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .dark { background: white !important; color: black !important; }
            .question-card { border: 1px solid #ccc; page-break-inside: avoid; box-shadow: none !important; }
        }
        
        /* Custom UI additions */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        .dark .glass-panel {
            background: rgba(31, 41, 55, 0.9);
        }
        
        .radio-custom:checked + div {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .dark .radio-custom:checked + div {
            border-color: #3b82f6;
            background-color: rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen font-sans">

    <!-- 1. LOGIN SCREEN -->
    <div id="login-view" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-100 dark:bg-gray-900 px-4">
        <div class="glass-panel p-8 rounded-2xl shadow-xl w-full max-w-md text-center border border-gray-200 dark:border-gray-700">
            <div class="mb-6 flex justify-center">
                <svg class="w-16 h-16 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <h1 class="text-2xl font-bold mb-2">Physics Smart-Sheet</h1>
            <p class="text-gray-500 dark:text-gray-400 mb-6">Grade 12 LS • Self-Induction & RL Circuits</p>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <input type="password" id="access-code" placeholder="Enter Access Code" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-brand-500 outline-none text-center text-lg tracking-widest transition-all">
                </div>
                <div id="login-error" class="hidden text-red-500 text-sm font-semibold">Invalid Access Code. Please try again.</div>
                <button type="submit" class="w-full bg-brand-600 hover:bg-brand-500 text-white font-bold py-3 px-4 rounded-xl transition-colors">
                    Access Worksheet
                </button>
            </form>
            <div class="mt-4 text-xs text-gray-400">Secured via Smart-Sheet Security Module v2.1</div>
        </div>
    </div>

    <!-- 2. MAIN WORKSHEET UI -->
    <div id="worksheet-view" class="hidden max-w-4xl mx-auto px-4 py-8 relative">
        
        <!-- Header Controls -->
        <header class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4 bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700">
            <div>
                <h2 class="text-2xl font-extrabold text-gray-800 dark:text-white">RL Circuit Revision</h2>
                <p class="text-brand-600 dark:text-brand-400 font-medium mt-1">Student: <span id="student-name-display" class="font-bold"></span></p>
            </div>
            <div class="flex gap-3 no-print">
                <button onclick="toggleHints()" class="px-4 py-2 text-sm font-medium bg-indigo-100 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-400 rounded-lg hover:bg-indigo-200 transition-colors">
                    Toggle Hints
                </button>
                <button onclick="toggleDarkMode()" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors" title="Toggle Dark Mode">
                    <svg class="w-5 h-5 dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    <svg class="w-5 h-5 hidden dark:block text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"></path></svg>
                </button>
            </div>
        </header>

        <!-- Quiz Form -->
        <form id="quiz-form" class="space-y-6">
            <div id="questions-container" class="space-y-6">
                <!-- Questions injected here by JS -->
            </div>

            <!-- Submit & Print Controls -->
            <div class="mt-8 flex flex-col sm:flex-row justify-end gap-4 no-print border-t border-gray-200 dark:border-gray-700 pt-6">
                <button type="button" onclick="window.print()" class="px-6 py-3 rounded-xl font-bold bg-gray-200 text-gray-700 dark:bg-gray-700 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors shadow-sm">
                    🖨️ Print / Save PDF
                </button>
                <button type="submit" id="submit-btn" class="px-8 py-3 rounded-xl font-bold bg-green-600 text-white hover:bg-green-500 transition-colors shadow-lg flex items-center justify-center gap-2">
                    <span>Submit to Smart-Sheet</span>
                    <svg class="w-5 h-5 hidden" id="loading-spinner" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
            
            <div id="feedback-msg" class="hidden mt-4 p-4 rounded-xl text-center font-bold text-lg"></div>
        </form>
    </div>

    <!-- CORE LOGIC & DATA -->
    <script>
        // --- 1. CONFIGURATION ---
        const CONFIG = {
            url: "https://script.google.com/macros/s/AKfycbyUWnimOGYFMVMwFKm6e1qKQA2l_BBQBDD1B8Lt8zgDHT2SOajiGAbeb1DXkojVlq2eyQ/exec",
            topic: "RL Circuit Revision (G12 LS)",
            students: {
                "احمد / خالد / درويش": "8156", 
                "احمد / محمود / الشفيق": "1518", 
                "احمد / محمود / صيداوي": "9147", 
                "احمد / محمود / مشحاوي": "7799", 
                "داني / بلال / درغام": "1016", 
                "محمد / خالد / شميسم": "9522", 
                "محمد سالم / هيسم / فيض الله": "1019", 
                "محمد نجيب / احمد / بحري": "3014", 
                "منذر / وليد / مسيكه": "7858", 
                "هادي / عمر / ابراهيم": "8963"
            },
            specialRoles: {
                "Teacher": "0000",
                "Tutor": "1111"
            }
        };

        // --- 2. QUESTION BANK ---
        const questions = [
            {
                id: "q1",
                level: "Easy",
                badgeColor: "bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400",
                text: "The proper magnetic flux \\(\\Phi\\) crossing a solenoid is proportional to the current \\(i\\) flowing through it. If a coil has an inductance \\(L = 5.0\\text{ mH}\\) and carries a current of \\(2.0\\text{ A}\\), the proper flux is:",
                options: [
                    { val: "A", label: "2.5 mWb" },
                    { val: "B", label: "10 mWb" },
                    { val: "C", label: "10 Wb" },
                    { val: "D", label: "0.4 Wb" }
                ],
                correct: "B",
                hint: "Use the formula \\(\\Phi = L \\cdot i\\). Be careful with your units (mH to mWb)."
            },
            {
                id: "q2",
                level: "Easy",
                badgeColor: "bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400",
                text: "During the establishment (growth) phase of a current in an RL series circuit, according to Lenz's Law, the coil acts as:",
                options: [
                    { val: "A", label: "A pure resistor that strictly dissipates energy." },
                    { val: "B", label: "A generator that creates an e.m.f. which reinforces the main current." },
                    { val: "C", label: "A generator that creates an e.m.f. which opposes the increase of the main current." },
                    { val: "D", label: "A short circuit with zero voltage across its terminals." }
                ],
                correct: "C",
                hint: "Lenz's Law dictates that induced effects always oppose the cause that produces them."
            },
            {
                id: "q3",
                level: "Easy",
                badgeColor: "bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400",
                text: "A series circuit contains a battery \\((E=12~V)\\), a resistor \\((R=5~\\Omega)\\), and a coil \\((L=0.2~H\\), internal resistance \\(r=1~\\Omega)\\). After reaching steady state, the voltage across the coil \\(u_{coil}\\) is:",
                options: [
                    { val: "A", label: "0 V" },
                    { val: "B", label: "2 V" },
                    { val: "C", label: "10 V" },
                    { val: "D", label: "12 V" }
                ],
                correct: "B",
                hint: "At steady state, current is constant (di/dt = 0). Find steady current I, then apply the coil's voltage formula."
            },
            {
                id: "q4",
                level: "Medium",
                badgeColor: "bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400",
                text: "A purely inductive coil (internal resistance \\(r=0\\)) has an inductance \\(L=0.1\\text{ H}\\). If the current passing through it increases at a constant rate of \\(50\\text{ A/s}\\), what is the voltage across the coil?",
                options: [
                    { val: "A", label: "0 V" },
                    { val: "B", label: "5 V" },
                    { val: "C", label: "50 V" },
                    { val: "D", label: "500 V" }
                ],
                correct: "B",
                hint: "For a purely inductive coil, the voltage is simply \\(u_{coil} = L \\frac{di}{dt}\\)."
            },
            {
                id: "q5",
                level: "Medium",
                badgeColor: "bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400",
                text: "A coil has an inductance \\(L=50\\text{ mH}\\). The instantaneous current \\(i(t)\\) passing through it increases uniformly from 0 A to 4.0 A in an interval of 10 ms. The magnitude of the average self-induced e.m.f. \\((e)\\) is:",
                options: [
                    { val: "A", label: "0.2 V" },
                    { val: "B", label: "2.0 V" },
                    { val: "C", label: "20 V" },
                    { val: "D", label: "200 V" }
                ],
                correct: "C",
                hint: "Use Faraday's law for self-induction magnitude: \\(|e| = L \\frac{\\Delta i}{\\Delta t}\\)."
            },
            {
                id: "q6",
                level: "Medium",
                badgeColor: "bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400",
                text: "By applying the Law of Addition of Voltages during the Growth Phase (battery E, resistor \\(R_1\\), coil \\(r, L\\)), the differential equation governing the current \\(i_{growth}(t)\\) is:",
                options: [
                    { val: "A", label: "\\(E = L\\frac{di}{dt}\\)" },
                    { val: "B", label: "\\(E = (R_1+r)i + L\\frac{di}{dt}\\)" },
                    { val: "C", label: "\\(0 = (R_1+r)i + L\\frac{di}{dt}\\)" },
                    { val: "D", label: "\\(E = R_1 i + L\\frac{di}{dt}\\)" }
                ],
                correct: "B",
                hint: "Sum the voltage across the resistor and the coil, and equate it to the generator voltage E."
            },
            {
                id: "q7",
                level: "Medium",
                badgeColor: "bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400",
                text: "During the Decay Phase, the battery is completely disconnected and the coil \\((r, L)\\) is short-circuited across a resistor \\(R_2\\). The differential equation governing the decay current \\(i(t)\\) is:",
                options: [
                    { val: "A", label: "\\(E = (R_2+r)i + L\\frac{di}{dt}\\)" },
                    { val: "B", label: "\\(0 = (R_2+r)i + L\\frac{di}{dt}\\)" },
                    { val: "C", label: "\\(0 = R_2 i + L\\frac{di}{dt}\\)" },
                    { val: "D", label: "\\(E = L\\frac{di}{dt}\\)" }
                ],
                correct: "B",
                hint: "Apply the Law of Addition of Voltages in the new loop where the total generator voltage is now 0."
            },
            {
                id: "q8",
                level: "Medium",
                badgeColor: "bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400",
                text: "An oscilloscope visualizes current growth in an RL circuit. The maximum steady current is \\(I_m=200\\text{ mA}\\). At \\(t = 4\\text{ ms}\\), the current measures \\(126\\text{ mA}\\). What is the approximate value of the time constant \\(\\tau\\)?",
                options: [
                    { val: "A", label: "2 ms" },
                    { val: "B", label: "4 ms" },
                    { val: "C", label: "6.3 ms" },
                    { val: "D", label: "20 ms" }
                ],
                correct: "B",
                hint: "Recall that at \\(t = \\tau\\), the growth current reaches approximately 63% of its maximum value \\(I_m\\)."
            },
            {
                id: "q9",
                level: "Medium",
                badgeColor: "bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400",
                text: "During the discharge (decay) phase of an RL circuit, the instantaneous current \\(i(t)\\) at exactly one time constant \\((t = \\tau)\\) drops to approximately:",
                options: [
                    { val: "A", label: "63% of \\(I_0\\)" },
                    { val: "B", label: "50% of \\(I_0\\)" },
                    { val: "C", label: "37% of \\(I_0\\)" },
                    { val: "D", label: "0% of \\(I_0\\)" }
                ],
                correct: "C",
                hint: "Evaluate \\(i(\\tau) = I_0 \\cdot e^{-\\tau/\\tau} = I_0 \\cdot e^{-1}\\)."
            },
            {
                id: "q10",
                level: "Brain Extension",
                badgeColor: "bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400",
                text: "A multi-position switch shifts from a current establishment loop (total resistance \\(R_1\\)) to a current decay loop (total resistance \\(R_2\\)). If \\(R_2\\) is twice as large as \\(R_1\\) \\((R_2 = 2R_1)\\), how does the decay time constant \\((\\tau_d)\\) compare to the growth time constant \\((\\tau_g)\\)?",
                options: [
                    { val: "A", label: "\\(\\tau_d = 2\\tau_g\\)" },
                    { val: "B", label: "\\(\\tau_d = \\frac{1}{2}\\tau_g\\)" },
                    { val: "C", label: "\\(\\tau_d = \\tau_g\\)" },
                    { val: "D", label: "\\(\\tau_d = 4\\tau_g\\)" }
                ],
                correct: "B",
                hint: "Look at the formula for the time constant: \\(\\tau = \\frac{L}{R_{total}}\\). How does doubling the denominator affect the fraction?"
            },
            {
                id: "q11",
                level: "Brain Extension",
                badgeColor: "bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400",
                text: "A purely inductive coil \\((r=0)\\) with \\(L=200\\text{ mH}\\) stores \\(0.4\\text{ J}\\) of magnetic energy at steady state. The steady current \\(I_m\\) flowing through the circuit is:",
                options: [
                    { val: "A", label: "1.0 A" },
                    { val: "B", label: "2.0 A" },
                    { val: "C", label: "4.0 A" },
                    { val: "D", label: "0.5 A" }
                ],
                correct: "B",
                hint: "Apply the magnetic energy formula: \\(W_m = \\frac{1}{2} L \\cdot i^2\\). Don't forget to convert mH to Henrys."
            },
            {
                id: "q12",
                level: "Brain Extension",
                badgeColor: "bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400",
                text: "Once the Growth Phase reaches a steady state (the current \\(i\\) is constant), how is the electrical power supplied by the battery \\(E\\) being utilized by the circuit?",
                options: [
                    { val: "A", label: "It continuously increases the magnetic energy stored in the coil." },
                    { val: "B", label: "It is entirely dissipated as thermal energy (Joule heating) in the resistors." },
                    { val: "C", label: "Half is dissipated as heat, and half is stored as magnetic energy." },
                    { val: "D", label: "The battery stops supplying power at steady state." }
                ],
                correct: "B",
                hint: "At steady state, \\(di/dt = 0\\). The magnetic energy \\(W_m = \\frac{1}{2}Li^2\\) is constant, meaning no *new* energy is being stored."
            },
            {
                id: "q13",
                level: "Brain Extension",
                badgeColor: "bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400",
                text: "Once steady state is reached, the battery is removed to start the Decay Phase at \\(t=0\\). Physically, what causes the initial decay current \\(I_0\\) to keep circulating rather than dropping instantly to zero?",
                options: [
                    { val: "A", label: "The residual voltage left inside the ideal wires." },
                    { val: "B", label: "The capacitor discharging its stored electrical energy." },
                    { val: "C", label: "The coil's 'inertia', creating an induced emf that attempts to maintain the previous current level." },
                    { val: "D", label: "The decay resistor \\(R_2\\) acting as an active power source." }
                ],
                correct: "C",
                hint: "Think about the concept of 'electrical inertia' as dictated by Faraday's and Lenz's laws when flux changes rapidly."
            }
        ];

        let currentUser = null;

        // --- 3. UI RENDERING & LOGIC ---

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = questions.map((q, index) => `
                <div class="question-card bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 transition-colors">
                    <div class="flex justify-between items-start mb-4">
                        <span class="font-bold text-gray-500 dark:text-gray-400 text-sm tracking-wider uppercase">Question ${index + 1}</span>
                        <span class="px-3 py-1 text-xs font-bold rounded-full ${q.badgeColor}">${q.level}</span>
                    </div>
                    <p class="text-lg font-medium text-gray-800 dark:text-gray-100 mb-5 leading-relaxed">${q.text}</p>
                    
                    <div class="space-y-3">
                        ${q.options.map((opt) => `
                            <label class="relative flex items-center p-4 border border-gray-200 dark:border-gray-600 rounded-xl cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                                <input type="radio" name="${q.id}" value="${opt.val}" required class="radio-custom sr-only">
                                <div class="absolute inset-0 rounded-xl border-2 border-transparent transition-colors pointer-events-none"></div>
                                <div class="w-6 h-6 flex-shrink-0 rounded-full border-2 border-gray-300 dark:border-gray-500 mr-4 flex items-center justify-center relative z-10">
                                    <div class="w-3 h-3 bg-brand-500 rounded-full opacity-0 transition-opacity"></div>
                                </div>
                                <span class="relative z-10 text-gray-700 dark:text-gray-200">${opt.label}</span>
                            </label>
                        `).join('')}
                    </div>
                    <div class="quiz-hint hidden mt-4 p-4 bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300 rounded-xl text-sm italic border border-blue-100 dark:border-blue-800/30">
                        💡 <strong>Hint:</strong> ${q.hint}
                    </div>
                </div>
            `).join('');

            // Add custom radio behavior css visually
            document.querySelectorAll('.radio-custom').forEach(radio => {
                radio.addEventListener('change', function() {
                    const group = document.getElementsByName(this.name);
                    group.forEach(r => r.nextElementSibling.nextElementSibling.firstElementChild.classList.remove('opacity-100'));
                    if(this.checked) this.nextElementSibling.nextElementSibling.firstElementChild.classList.add('opacity-100');
                });
            });

            // Re-render MathJax
            if(window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function toggleHints() {
            document.querySelectorAll('.quiz-hint').forEach(hint => {
                hint.classList.toggle('hidden');
            });
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }

        // --- 4. AUTHENTICATION & FORM HANDLING ---
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const codeInput = document.getElementById('access-code').value.trim();
            const errorMsg = document.getElementById('login-error');
            
            // Validate code
            let foundUser = null;
            
            // Check student list
            for (const [name, code] of Object.entries(CONFIG.students)) {
                if (code === codeInput) {
                    foundUser = name;
                    break;
                }
            }
            
            // Check special roles
            if (!foundUser) {
                for (const [role, code] of Object.entries(CONFIG.specialRoles)) {
                    if (code === codeInput) {
                        foundUser = role;
                        break;
                    }
                }
            }

            if (foundUser) {
                currentUser = foundUser;
                document.getElementById('student-name-display').textContent = currentUser;
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('worksheet-view').classList.remove('hidden');
                renderQuestions();
                errorMsg.classList.add('hidden');
            } else {
                errorMsg.classList.remove('hidden');
            }
        });

        // Grading and Submission
        document.getElementById('quiz-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const spinner = document.getElementById('loading-spinner');
            const feedback = document.getElementById('feedback-msg');
            
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            spinner.classList.remove('hidden');
            
            const formData = new FormData(e.target);
            let correctCount = 0;
            let answerLog = [];

            questions.forEach(q => {
                const selected = formData.get(q.id);
                const isCorrect = selected === q.correct;
                if (isCorrect) correctCount++;
                
                // Format for sheet: "Q1: Correct (A)" or "Q1: Incorrect (B)"
                answerLog.push(`${q.id.toUpperCase()}: ${isCorrect ? 'Correct' : 'Incorrect'} (${selected || 'Empty'})`);
                
                // Visual feedback
                const block = document.getElementsByName(q.id)[0].closest('.question-card');
                if (isCorrect) {
                    block.classList.add('border-green-400', 'dark:border-green-500');
                } else {
                    block.classList.add('border-red-400', 'dark:border-red-500');
                }
            });

            const scorePercent = Math.round((correctCount / questions.length) * 100);
            
            const payload = {
                name: currentUser,
                topic: CONFIG.topic,
                score: scorePercent,
                answers: answerLog.join(", ")
            };

            try {
                // Submit to Google App Script - ensuring text/plain CORS bypass
                const response = await fetch(CONFIG.url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    feedback.className = "mt-6 p-4 rounded-xl text-center font-bold text-lg bg-green-100 text-green-800 dark:bg-green-900/50 dark:text-green-300";
                    feedback.innerHTML = `✅ Successfully submitted! Your score: ${scorePercent}%`;
                } else {
                    throw new Error("Network response not ok");
                }
            } catch (err) {
                console.error('Submission Error:', err);
                // Fallback UI indication since fetch might complain about opaque responses depending on AppScript return
                feedback.className = "mt-6 p-4 rounded-xl text-center font-bold text-lg bg-yellow-100 text-yellow-800 dark:bg-yellow-900/50 dark:text-yellow-300";
                feedback.innerHTML = `⚠️ Submission sent. (Score: ${scorePercent}%). Note: Google connection status unverified.`;
            }

            feedback.classList.remove('hidden');
            btn.querySelector('span').innerText = 'Submitted';
            spinner.classList.add('hidden');
        });
    </script>
</body>
</html>
