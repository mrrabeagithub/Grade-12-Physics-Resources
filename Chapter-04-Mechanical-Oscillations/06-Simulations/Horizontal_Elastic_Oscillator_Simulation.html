<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Spring-Mass Oscillator V4</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #333;
            --card-bg: white;
            --card-shadow: rgba(0,0,0,0.1);
            --border-color: #eee;
            --input-bg: white;
            --btn-start-bg: #28a745;
            --btn-start-hover: #218838;
            --btn-reset-bg: #007bff;
            --btn-reset-hover: #0056b3;
            --btn-pause-bg: #ffc107;
            --btn-pause-hover: #e0a800;
            --btn-default-bg: transparent;
            --btn-default-text: #666;
            --btn-default-border: #ccc;
            --overlay-bg: rgba(255, 255, 255, 0.9);
            --overlay-border: #ddd;
            --chart-grid: #e5e5e5;
            --canvas-env-stroke: #333;
            --canvas-text: #888;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --card-shadow: rgba(0,0,0,0.5);
            --border-color: #333;
            --input-bg: #2c2c2c;
            --btn-start-bg: #1e7e34;
            --btn-start-hover: #155d27;
            --btn-reset-bg: #0056b3;
            --btn-reset-hover: #004494;
            --btn-pause-bg: #d39e00;
            --btn-pause-hover: #b28600;
            --btn-default-bg: #2c2c2c;
            --btn-default-text: #aaa;
            --btn-default-border: #555;
            --overlay-bg: rgba(30, 30, 30, 0.9);
            --overlay-border: #444;
            --chart-grid: #444;
            --canvas-env-stroke: #ccc;
            --canvas-text: #aaa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }
        h1 {
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            font-size: 0.9rem;
            color: var(--text-color);
            opacity: 0.8;
            margin-bottom: 20px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        
        /* Top Section: Animation + Energy Bars */
        .vis-container {
            width: 100%;
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .canvas-card {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px var(--card-shadow);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative; /* For overlay */
            transition: background-color 0.3s;
        }

        /* Main controls section */
        .controls {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px var(--card-shadow);
            width: 100%;
            max-width: 350px;
            height: fit-content;
            transition: background-color 0.3s;
        }
        .control-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--text-color);
            font-size: 0.9rem;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            background-color: var(--input-bg);
        }
        .value-display {
            float: right;
            color: #007bff;
            font-weight: bold;
        }
        
        /* Extra Options */
        .options-group {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: var(--text-color);
        }
        .checkbox-label input {
            width: auto;
            margin-right: 10px;
        }

        .charts-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 300px;
        }
        .chart-box {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px var(--card-shadow);
            height: 200px; /* Slightly reduced height to fit 3 charts */
            position: relative;
            transition: background-color 0.3s;
        }
        
        /* Button Styling */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s;
            font-size: 1rem;
        }
        button#startBtn { background-color: var(--btn-start-bg); color: white; }
        button#startBtn:hover { background-color: var(--btn-start-hover); }
        button#resetBtn { background-color: var(--btn-reset-bg); color: white; }
        button#resetBtn:hover { background-color: var(--btn-reset-hover); }
        button#pauseBtn { background-color: var(--btn-pause-bg); color: #333; }
        button#pauseBtn:hover { background-color: var(--btn-pause-hover); }
        button#pauseBtn.paused { background-color: #17a2b8; color: white; }
        button:disabled { background-color: #ccc; cursor: not-allowed; opacity: 0.6; }

        .defaults-btn {
            background: var(--btn-default-bg);
            border: 1px solid var(--btn-default-border);
            color: var(--btn-default-text);
            font-size: 0.8rem;
            padding: 5px;
            margin-top: 10px;
            width: 100%;
        }
        .defaults-btn:hover {
            background: rgba(0,0,0,0.05);
            color: var(--text-color);
        }

        /* Data Overlay */
        .data-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--overlay-bg);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--overlay-border);
            font-family: monospace;
            font-size: 13px;
            line-height: 1.4;
            pointer-events: none; /* Allow clicks to pass through */
            color: var(--text-color);
        }

        /* Theme Toggle */
        .theme-switch-wrapper {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .theme-switch {
            display: inline-block;
            height: 24px;
            position: relative;
            width: 50px;
            margin-right: 10px;
        }
        .theme-switch input {
            display: none;
        }
        .slider {
            background-color: #ccc;
            bottom: 0;
            cursor: pointer;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            background-color: white;
            bottom: 4px;
            content: "";
            height: 16px;
            left: 4px;
            position: absolute;
            transition: .4s;
            width: 16px;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #007bff;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>

    <h1>Horizontal Spring-Mass Oscillator <span style="font-size: 0.6em; font-weight: normal;">(by Rabih A.G.)</span></h1>

    <div class="vis-container">
        <!-- Main Animation -->
        <div class="canvas-card">
            <canvas id="simCanvas" width="650" height="250"></canvas>
            <div class="data-overlay" id="dataDisplay">
                t: 0.00 s<br>
                x: 0.00 m<br>
                v: 0.00 m/s<br>
                a: 0.00 m/s²
            </div>
        </div>
        <!-- Energy Bars -->
        <div class="canvas-card">
            <canvas id="energyCanvas" width="150" height="250"></canvas>
        </div>
    </div>
    
    <div class="container">
        <div class="controls">
            <!-- Theme Toggle -->
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider round"></div>
                </label>
                <span>Dark Mode</span>
            </div>

            <div class="control-group">
                <label>Mass (m): <span id="val-m" class="value-display">1.0 kg</span></label>
                <input type="range" id="slider-m" min="0.1" max="5" step="0.1" value="1.0">
            </div>
            <div class="control-group">
                <label>Spring Constant (k): <span id="val-k" class="value-display">10 N/m</span></label>
                <input type="range" id="slider-k" min="1" max="50" step="1" value="10">
            </div>
            <div class="control-group">
                <label>Damping (b): <span id="val-b" class="value-display">0.0 kg/s</span></label>
                <input type="range" id="slider-b" min="0" max="5" step="0.1" value="0.0">
            </div>
            <div class="control-group">
                <label>Initial Position (x₀): <span id="val-x0" class="value-display">1.0 m</span></label>
                <input type="range" id="slider-x0" min="-1.5" max="1.5" step="0.1" value="1.0">
            </div>
            
            <div class="options-group">
                <div class="control-group">
                    <label>Simulation Speed: <span id="val-speed" class="value-display">1.0x</span></label>
                    <input type="range" id="slider-speed" min="0.1" max="2.0" step="0.1" value="1.0">
                </div>
                <label class="checkbox-label">
                    <input type="checkbox" id="vectorToggle"> Show Vectors (v, a)
                </label>
            </div>

            <div class="btn-group">
                <button id="startBtn">Start</button>
                <button id="pauseBtn" disabled>Pause</button>
                <button id="resetBtn">Reset</button>
            </div>
            
            <button class="defaults-btn" id="defaultBtn">Restore Defaults</button>
        </div>

        <div class="charts-container">
            <div class="chart-box">
                <canvas id="posChart"></canvas>
            </div>
            <div class="chart-box">
                <canvas id="velChart"></canvas>
            </div>
            <div class="chart-box">
                <canvas id="accChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const config = {
            m: 1.0,
            k: 10.0,
            b: 0.0,
            x0: 1.0,
            v0: 0.0,
            tMax: 20,
            dt: 0.02, // Finer resolution
            timeScale: 1.0,
            showVectors: false,
            darkMode: false
        };

        let animationId;
        let lastFrameTime;
        let simTime = 0; 
        let trajectories = {}; 
        
        // State Variables
        let isRunning = false;
        let isPaused = false;
        
        // Dragging State
        let isDragging = false;
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const scaleX = 100; // Pixels per meter
        const centerX = canvas.width / 2;
        const floorY = 180;
        const blockWidth = 60;
        const blockHeight = 60;

        // --- Theme Logic ---
        const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
        
        function switchTheme(e) {
            if (e.target.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                config.darkMode = true;
                updateChartsTheme(true);
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                config.darkMode = false;
                updateChartsTheme(false);
            }
            if (!isRunning) updateParameters(false); // Redraw canvas if static
        }
        toggleSwitch.addEventListener('change', switchTheme, false);

        // --- Physics Engine ---
        function calculateTrajectory() {
            const { m, k, b, x0, v0, tMax, dt } = config;
            const w0 = Math.sqrt(k / m);
            const zeta = b / (2 * m * w0); 

            let tPoints = [];
            let xPoints = [];
            let vPoints = [];
            let aPoints = [];
            let kePoints = [];
            let pePoints = [];
            let mePoints = [];

            for (let t = 0; t <= tMax; t += dt) {
                tPoints.push(t.toFixed(2));
                let x_t, v_t, a_t;

                if (zeta < 1) {
                    const wd = w0 * Math.sqrt(1 - zeta * zeta);
                    const gamma = zeta * w0; 
                    const decay = Math.exp(-gamma * t);
                    
                    const A = x0;
                    const B = (v0 + gamma * x0) / wd;

                    x_t = decay * (A * Math.cos(wd * t) + B * Math.sin(wd * t));
                    v_t = -gamma * x_t + decay * (-A * wd * Math.sin(wd * t) + B * wd * Math.cos(wd * t));

                } else if (Math.abs(zeta - 1) < 0.001) {
                    const decay = Math.exp(-w0 * t);
                    const A = x0;
                    const B = v0 + w0 * x0;
                    x_t = (A + B * t) * decay;
                    v_t = (B - w0 * (A + B * t)) * decay; 
                } else {
                    const r1 = -w0 * (zeta - Math.sqrt(zeta * zeta - 1));
                    const r2 = -w0 * (zeta + Math.sqrt(zeta * zeta - 1));
                    const C2 = (v0 - r1 * x0) / (r2 - r1);
                    const C1 = x0 - C2;

                    x_t = C1 * Math.exp(r1 * t) + C2 * Math.exp(r2 * t);
                    v_t = C1 * r1 * Math.exp(r1 * t) + C2 * r2 * Math.exp(r2 * t);
                }

                a_t = (-k * x_t - b * v_t) / m;

                xPoints.push(x_t);
                vPoints.push(v_t);
                aPoints.push(a_t);
                
                kePoints.push(0.5 * m * v_t * v_t);
                pePoints.push(0.5 * k * x_t * x_t);
                mePoints.push(0.5 * m * v_t * v_t + 0.5 * k * x_t * x_t);
            }
            return { tPoints, xPoints, vPoints, aPoints, kePoints, pePoints, mePoints };
        }

        // --- Drawing Functions ---
        const energyCanvas = document.getElementById('energyCanvas');
        const ctxE = energyCanvas.getContext('2d');

        function drawArrow(fromX, fromY, vecValue, scale, color, label) {
            const arrowLen = vecValue * scale;
            const toX = fromX + arrowLen;
            const toY = fromY;
            
            if (Math.abs(arrowLen) < 2) return; 

            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.stroke();

            // Arrowhead
            const headLen = 8;
            const angle = Math.atan2(0, arrowLen);
            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headLen * Math.cos(angle - Math.PI / 6), toY - headLen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(toX - headLen * Math.cos(angle + Math.PI / 6), toY - headLen * Math.sin(angle + Math.PI / 6));
            ctx.lineTo(toX, toY);
            ctx.fillStyle = color;
            ctx.fill();
            
            // Enhanced Label
            ctx.fillStyle = color;
            ctx.font = 'bold 14px Arial';
            // Position label slightly offset to not overlap
            ctx.fillText(label, toX + (arrowLen > 0 ? 5 : -15), toY - 5);
        }

        function drawSystem(x, v, a) {
            const envStroke = getComputedStyle(document.body).getPropertyValue('--canvas-env-stroke').trim();
            const textColor = getComputedStyle(document.body).getPropertyValue('--canvas-text').trim();

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Environment
            ctx.beginPath();
            ctx.moveTo(50, floorY);
            ctx.lineTo(600, floorY);
            ctx.strokeStyle = envStroke;
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(50, floorY - 100);
            ctx.lineTo(50, floorY + 20);
            ctx.lineWidth = 5;
            ctx.stroke();
            
            // Equilibrium Line
            ctx.beginPath();
            ctx.setLineDash([5, 5]);
            ctx.moveTo(centerX, floorY - 100);
            ctx.lineTo(centerX, floorY + 20);
            ctx.strokeStyle = textColor; // Use text color for lighter/darker contrast
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = textColor;
            ctx.font = '12px Arial';
            ctx.fillText('x=0', centerX - 10, floorY + 35);

            // Block
            const blockX = centerX + (x * scaleX) - (blockWidth / 2);
            const blockY = floorY - blockHeight;

            // Visual feedback for dragging
            ctx.fillStyle = isDragging ? '#0056b3' : '#0ea5e9'; 
            ctx.fillRect(blockX, blockY, blockWidth, blockHeight);
            ctx.strokeRect(blockX, blockY, blockWidth, blockHeight);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Arial';
            ctx.fillText('m', blockX + 22, blockY + 35);

            // Spring
            const startX = 50;
            const endX = blockX;
            const springY = floorY - (blockHeight / 2);
            
            ctx.beginPath();
            ctx.moveTo(startX, springY);
            const numCoils = 12;
            const springLen = endX - startX;
            const step = springLen / numCoils;
            for (let i = 1; i <= numCoils; i++) {
                const cx = startX + i * step;
                const cy = springY + ((i % 2 === 0) ? 10 : -10);
                if (i===numCoils) ctx.lineTo(cx, springY);
                else ctx.lineTo(cx - step/2, cy);
            }
            ctx.lineTo(endX, springY);
            ctx.strokeStyle = envStroke;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Vectors
            if (config.showVectors) {
                const vecY = blockY - 20;
                const vecX = blockX + blockWidth/2;
                // Velocity Arrow (Green)
                drawArrow(vecX, vecY, v, 40, '#28a745', 'v');
                // Acceleration Arrow (Orange)
                drawArrow(vecX, vecY - 15, a, 20, '#fd7e14', 'a');
            }
        }

        function drawEnergies(ke, pe, me) {
            const textColor = getComputedStyle(document.body).getPropertyValue('--text-color').trim();
            const w = energyCanvas.width;
            const h = energyCanvas.height;
            ctxE.clearRect(0, 0, w, h);

            const maxE = Math.max(0.1, trajectories.mePoints[0] * 1.2); 
            const barW = 30;
            const spacing = 10;
            const startX = 20;
            const bottomY = h - 30;
            const scaleY = (h - 50) / maxE;

            function drawBar(val, index, color, label) {
                const bh = val * scaleY;
                const bx = startX + index * (barW + spacing);
                const by = bottomY - bh;
                
                ctxE.fillStyle = color;
                ctxE.fillRect(bx, by, barW, bh);
                
                // Value text above bar
                ctxE.fillStyle = textColor;
                ctxE.font = '10px Arial';
                ctxE.fillText(val.toFixed(1), bx, by - 5);
                
                // Label text below bar
                ctxE.fillStyle = textColor;
                ctxE.font = 'bold 12px Arial';
                ctxE.fillText(label, bx + 5, bottomY + 15);
            }

            drawBar(ke, 0, '#dc3545', 'KE');
            drawBar(pe, 1, '#007bff', 'PE');
            drawBar(me, 2, '#28a745', 'ME');
            
            ctxE.fillStyle = textColor;
            ctxE.font = 'bold 14px Arial';
            ctxE.fillText("Energy (J)", w/2 - 30, 20);
        }

        // --- Animation Loop ---
        function startAnimation() {
            if (animationId) cancelAnimationFrame(animationId);
            
            isRunning = true;
            // Disable inputs during run except speed/vectors
            toggleInputs(false);
            document.getElementById('startBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            document.getElementById('resetBtn').disabled = false;

            lastFrameTime = Date.now();
            
            function loop() {
                if (!isRunning) return;

                const now = Date.now();
                const dtReal = (now - lastFrameTime) / 1000;
                lastFrameTime = now;

                if (!isPaused) {
                    simTime += dtReal * config.timeScale;
                }

                if (simTime > config.tMax) {
                    simTime = 0;
                }

                const index = Math.floor(simTime / config.dt);
                
                if (index < trajectories.xPoints.length) {
                    const x = trajectories.xPoints[index];
                    const v = trajectories.vPoints[index];
                    const a = trajectories.aPoints[index];
                    const ke = trajectories.kePoints[index];
                    const pe = trajectories.pePoints[index];
                    const me = trajectories.mePoints[index];

                    drawSystem(x, v, a);
                    drawEnergies(ke, pe, me);
                    updateDataDisplay(simTime, x, v, a);
                    updateChartCursor(simTime);
                }
                
                animationId = requestAnimationFrame(loop);
            }
            loop();
        }

        // --- Drag Interaction ---
        canvas.addEventListener('mousedown', (e) => {
            if (isRunning) return; // Disable dragging while running
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            // Check if clicking on block
            const currentXPixel = centerX + (config.x0 * scaleX);
            const blockLeft = currentXPixel - blockWidth/2;
            const blockRight = currentXPixel + blockWidth/2;
            const blockTop = floorY - blockHeight;
            const blockBottom = floorY;

            if (mouseX >= blockLeft && mouseX <= blockRight && mouseY >= blockTop && mouseY <= blockBottom) {
                isDragging = true;
                canvas.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            
            // Calculate new x0 from mouse position
            let newX0 = (mouseX - centerX) / scaleX;
            
            // Clamp values
            newX0 = Math.max(-1.5, Math.min(1.5, newX0));
            
            // Update Config and Slider
            config.x0 = newX0;
            document.getElementById('slider-x0').value = newX0;
            document.getElementById('val-x0').textContent = newX0.toFixed(1) + " m";
            
            // Redraw static system
            updateParameters(false); // false = don't start animation
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                canvas.style.cursor = 'default';
                updateParameters(); // Recalculate trajectories based on final drop
            }
        });


        // --- Charts ---
        const ctxPos = document.getElementById('posChart').getContext('2d');
        const ctxVel = document.getElementById('velChart').getContext('2d');
        const ctxAcc = document.getElementById('accChart').getContext('2d');

        // Cursor Plugin
        const cursorPlugin = {
            id: 'cursorLine',
            afterDraw: (chart) => {
                if (!isRunning) return;
                const ctx = chart.ctx;
                const xAxis = chart.scales.x;
                const yAxis = chart.scales.y;
                const x = xAxis.getPixelForValue(simTime);

                if (x >= xAxis.left && x <= xAxis.right) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(x, yAxis.top);
                    ctx.lineTo(x, yAxis.bottom);
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = 'rgba(255, 0, 0, 0.8)';
                    ctx.stroke();
                    ctx.restore();
                }
            }
        };
        Chart.register(cursorPlugin);

        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            interaction: { mode: 'nearest', axis: 'x', intersect: false },
            elements: { point: { radius: 0 } },
            scales: { x: { type: 'linear', title: { display: true, text: 'Time (s)'} } }
        };

        const posChart = new Chart(ctxPos, {
            type: 'line',
            data: { datasets: [{ label: 'Position x(t) [m]', borderColor: '#007bff', borderWidth: 2, data: [] }] },
            options: {
                ...commonOptions,
                plugins: { title: { display: true, text: 'Position vs. Time' }, legend: { display: false } },
                scales: { ...commonOptions.scales, y: { title: { display: true, text: 'Position (m)' }, min: -2, max: 2 } }
            }
        });

        const velChart = new Chart(ctxVel, {
            type: 'line',
            data: { datasets: [{ label: 'Velocity v(t) [m/s]', borderColor: '#dc3545', borderWidth: 2, data: [] }] },
            options: {
                ...commonOptions,
                plugins: { title: { display: true, text: 'Velocity vs. Time' }, legend: { display: false } },
                scales: { ...commonOptions.scales, y: { title: { display: true, text: 'Velocity (m/s)' }, min: -5, max: 5 } }
            }
        });

        const accChart = new Chart(ctxAcc, {
            type: 'line',
            data: { datasets: [{ label: 'Acceleration a(t) [m/s²]', borderColor: '#fd7e14', borderWidth: 2, data: [] }] },
            options: {
                ...commonOptions,
                plugins: { title: { display: true, text: 'Acceleration vs. Time' }, legend: { display: false } },
                scales: { ...commonOptions.scales, y: { title: { display: true, text: 'Accel (m/s²)' }, min: -10, max: 10 } }
            }
        });

        function updateChartsTheme(isDark) {
            const textColor = isDark ? '#e0e0e0' : '#666';
            const gridColor = isDark ? '#444' : '#e5e5e5';

            [posChart, velChart, accChart].forEach(chart => {
                chart.options.scales.x.ticks.color = textColor;
                chart.options.scales.x.title.color = textColor;
                chart.options.scales.x.grid.color = gridColor;
                
                chart.options.scales.y.ticks.color = textColor;
                chart.options.scales.y.title.color = textColor;
                chart.options.scales.y.grid.color = gridColor;
                
                chart.options.plugins.title.color = textColor;
                chart.update();
            });
        }

        function updateChartCursor() {
            posChart.draw();
            velChart.draw();
            accChart.draw();
        }
        
        function updateDataDisplay(t, x, v, a) {
            document.getElementById('dataDisplay').innerHTML = 
                `t: ${t.toFixed(2)} s<br>` +
                `x: ${x.toFixed(2)} m<br>` +
                `v: ${v.toFixed(2)} m/s<br>` +
                `a: ${a.toFixed(2)} m/s²`;
        }

        // --- Logic ---
        function updateParameters(recalc = true) {
            config.m = parseFloat(document.getElementById('slider-m').value);
            config.k = parseFloat(document.getElementById('slider-k').value);
            config.b = parseFloat(document.getElementById('slider-b').value);
            if (!isDragging) config.x0 = parseFloat(document.getElementById('slider-x0').value);
            config.timeScale = parseFloat(document.getElementById('slider-speed').value);
            config.showVectors = document.getElementById('vectorToggle').checked;

            // Update Labels
            document.getElementById('val-m').textContent = config.m.toFixed(1) + " kg";
            document.getElementById('val-k').textContent = config.k.toFixed(0) + " N/m";
            document.getElementById('val-b').textContent = config.b.toFixed(1) + " kg/s";
            document.getElementById('val-x0').textContent = config.x0.toFixed(1) + " m";
            document.getElementById('val-speed').textContent = config.timeScale.toFixed(1) + "x";

            if (recalc) {
                // Recalc Physics
                trajectories = calculateTrajectory();

                // Update Chart Data
                const posData = trajectories.tPoints.map((t, i) => ({x: parseFloat(t), y: trajectories.xPoints[i]}));
                const velData = trajectories.tPoints.map((t, i) => ({x: parseFloat(t), y: trajectories.vPoints[i]}));
                const accData = trajectories.tPoints.map((t, i) => ({x: parseFloat(t), y: trajectories.aPoints[i]}));

                posChart.data.datasets[0].data = posData;
                velChart.data.datasets[0].data = velData;
                accChart.data.datasets[0].data = accData;
                
                // Scales
                const maxX = Math.max(Math.abs(config.x0) * 1.2, 1.0); 
                posChart.options.scales.y.min = -maxX;
                posChart.options.scales.y.max = maxX;
                
                const estW = Math.sqrt(config.k/config.m);
                const maxV = Math.max(Math.abs(config.x0 * estW) * 1.2, 1.0);
                velChart.options.scales.y.min = -maxV;
                velChart.options.scales.y.max = maxV;

                const maxA = Math.max(Math.abs(config.k * config.x0 / config.m) * 1.2, 1.0);
                accChart.options.scales.y.min = -maxA;
                accChart.options.scales.y.max = maxA;

                posChart.update();
                velChart.update();
                accChart.update();
            }

            // Static Draw if not running
            if (!isRunning) {
                const accel = (-config.k*config.x0)/config.m; // a at t=0
                drawSystem(config.x0, config.v0, accel);
                
                const initKE = 0.5*config.m*config.v0*config.v0;
                const initPE = 0.5*config.k*config.x0*config.x0;
                drawEnergies(initKE, initPE, initKE+initPE);
                
                updateDataDisplay(0, config.x0, config.v0, accel);
            }
        }
        
        function resetSimulation() {
             if (animationId) cancelAnimationFrame(animationId);
             isRunning = false;
             isPaused = false;
             simTime = 0;
             
             toggleInputs(true);
             document.getElementById('startBtn').disabled = false;
             document.getElementById('pauseBtn').disabled = true;
             document.getElementById('pauseBtn').innerText = "Pause";
             document.getElementById('pauseBtn').classList.remove("paused");
             
             // Keep current parameter values, just reset state
             updateParameters();
        }
        
        function restoreDefaults() {
             resetSimulation();
             document.getElementById('slider-m').value = 1.0;
             document.getElementById('slider-k').value = 10;
             document.getElementById('slider-b').value = 0.0;
             document.getElementById('slider-x0').value = 1.0;
             document.getElementById('slider-speed').value = 1.0;
             document.getElementById('vectorToggle').checked = false;
             updateParameters();
        }

        function togglePause() {
            if (!isRunning) return;
            isPaused = !isPaused;
            const btn = document.getElementById('pauseBtn');
            if (isPaused) {
                btn.innerText = "Resume";
                btn.classList.add("paused");
            } else {
                btn.innerText = "Pause";
                btn.classList.remove("paused");
                lastFrameTime = Date.now(); 
            }
        }
        
        function toggleInputs(enable) {
            document.getElementById('slider-m').disabled = !enable;
            document.getElementById('slider-k').disabled = !enable;
            document.getElementById('slider-b').disabled = !enable;
            document.getElementById('slider-x0').disabled = !enable;
            // Speed and vectors can be changed while running
        }

        // Event Listeners
        const inputs = document.querySelectorAll('input[type="range"], input[type="checkbox"]');
        inputs.forEach(input => {
            if (input.id !== 'checkbox') { // Skip theme toggle
                input.addEventListener('input', () => updateParameters(true));
            }
        });
        
        document.getElementById('startBtn').addEventListener('click', startAnimation);
        document.getElementById('resetBtn').addEventListener('click', resetSimulation);
        document.getElementById('pauseBtn').addEventListener('click', togglePause);
        document.getElementById('defaultBtn').addEventListener('click', restoreDefaults);

        // Initial load
        updateParameters();

    </script>
</body>
</html>
