<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 12 GS Physics Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-3px); border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 15px 30px -10px rgba(0,0,0,0.5); }
        .search-focus:focus-within { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">

    <div class="max-w-5xl mx-auto">
        <!-- Navigation & Search -->
        <div class="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
            <nav class="flex items-center space-x-2 text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">
                <a href="/" id="root-link" class="hover:text-blue-400 transition flex items-center">
                    <i class="fas fa-home mr-2"></i> Portal
                </a>
                <span>/</span>
                <span id="current-crumb" class="text-blue-500">Resources</span>
            </nav>
            
            <div class="glass px-4 py-2 rounded-xl flex items-center space-x-3 search-focus transition-all md:w-64">
                <i class="fas fa-search text-slate-500 text-sm"></i>
                <input type="text" id="search-input" placeholder="Filter resources..." class="bg-transparent border-none outline-none text-sm text-white placeholder-slate-600 w-full">
            </div>
        </div>

        <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <div class="flex items-center space-x-3 mb-2">
                    <div class="h-2 w-2 rounded-full bg-blue-500 animate-pulse"></div>
                    <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Live Sync Active</span>
                </div>
                <h1 id="folder-name" class="text-4xl md:text-5xl font-black text-white mb-3 italic tracking-tighter">Loading...</h1>
                <p id="folder-desc" class="text-slate-400 max-w-xl text-sm leading-relaxed">
                    Interactive resources for <strong>Grade 12 GS Physics</strong>. 
                    Synchronized directly with the primary curriculum repository.
                </p>
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="loadResources(true)" class="p-3 glass rounded-xl hover:bg-white/10 transition group" title="Force Refresh">
                    <i class="fas fa-sync-alt text-slate-400 group-active:rotate-180 transition-transform duration-500"></i>
                </button>
                <a href="https://github.com/mrrabeagithub/Grade-12-Physics-Resources" target="_blank" id="source-link" class="glass px-6 py-3 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-white/10 transition flex items-center border-white/5">
                    <i class="fab fa-github mr-2 text-base"></i> Repo
                </a>
            </div>
        </header>

        <div id="file-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

        <!-- States -->
        <div id="empty-state" class="hidden text-center py-24 glass rounded-3xl border-dashed border-slate-700">
            <i class="fas fa-box-open text-4xl text-slate-700 mb-4"></i>
            <h3 class="text-xl font-bold text-slate-500">No resources found</h3>
            <p class="text-slate-600 text-sm mb-4">The directory appears empty or the path is incorrect.</p>
            <div id="debug-path" class="text-[10px] text-slate-500 font-mono bg-black/20 p-2 rounded inline-block"></div>
        </div>

        <div id="loader" class="text-center py-24">
            <i class="fas fa-atom fa-spin text-5xl text-blue-600"></i>
            <p class="text-xs text-slate-500 mt-4 font-bold uppercase tracking-widest">Accessing GitHub API...</p>
        </div>

        <div id="error-message" class="hidden glass p-10 rounded-3xl border-red-500/20 text-center">
            <i class="fas fa-exclamation-triangle text-red-500 text-2xl mb-4"></i>
            <h3 class="text-xl font-bold text-white mb-2">Sync Interrupted</h3>
            <p id="error-text" class="text-slate-400 text-sm mb-4"></p>
            <div id="error-debug" class="text-[10px] text-red-400/60 font-mono bg-red-950/20 p-2 rounded inline-block"></div>
        </div>
    </div>

    <script>
        const repoOwner = "mrrabeagithub";
        const repoName = "Grade-12 GS-Physics-Resources";
        let allItems = []; 
        
        function sanitize(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function loadResources(force = false) {
            const grid = document.getElementById('file-grid');
            const loader = document.getElementById('loader');
            const errorContainer = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const titleElement = document.getElementById('folder-name');
            const rootLink = document.getElementById('root-link');
            const crumb = document.getElementById('current-crumb');
            const debugPath = document.getElementById('debug-path');
            const errorDebug = document.getElementById('error-debug');

            grid.innerHTML = '';
            loader.classList.remove('hidden');
            errorContainer.classList.add('hidden');
            document.getElementById('empty-state').classList.add('hidden');

            const pathSegments = window.location.pathname.split('/').filter(s => s && s !== 'index.html');
            const repoIndex = pathSegments.indexOf(repoName);
            
            let segments = [];
            if (repoIndex !== -1) {
                // Running live on GitHub Pages
                segments = pathSegments.slice(repoIndex + 1);
            } else {
                // Local testing fallback: Search for the Chapter folder
                const chapIdx = pathSegments.findIndex(s => s.toLowerCase().includes('chapter-'));
                if (chapIdx !== -1) {
                    segments = pathSegments.slice(chapIdx);
                } else {
                    // If no chapter found, assume we are at the root or testing in a flat folder
                    segments = pathSegments.length > 0 ? [pathSegments[pathSegments.length - 1]] : [];
                }
            }

            const depth = segments.length;
            rootLink.href = depth > 0 ? "../".repeat(depth) + "index.html" : "index.html";

            // Fix for URL Encoding (%20, &) and hyphen formatting
            const decodedSegments = segments.map(s => decodeURIComponent(s));
            const currentPath = decodedSegments.join('/');
            const rawFolderName = decodedSegments[decodedSegments.length - 1] || 'Grade 12 GS Physics Portal';
            const cleanFolderName = rawFolderName.replace(/-/g, ' ');
            
            titleElement.innerText = cleanFolderName;
            crumb.innerText = cleanFolderName;

            const cacheBuster = force ? `&t=${Date.now()}` : '';
            const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${currentPath}?ref=main${cacheBuster}`;

            try {
                const response = await fetch(apiUrl);
                if (response.status === 403) throw new Error("API rate limit exceeded.");
                if (!response.ok) {
                    throw new Error(`Directory not yet available on GitHub.`);
                }

                allItems = await response.json();
                loader.classList.add('hidden');
                
                if (!Array.isArray(allItems) || allItems.length === 0) {
                    document.getElementById('empty-state').classList.remove('hidden');
                    debugPath.innerText = `API Path: ${currentPath}`;
                } else {
                    renderItems(allItems);
                }

            } catch (error) {
                console.error("Gallery Sync Error:", error);
                loader.classList.add('hidden');
                errorText.innerText = error.message;
                errorDebug.innerText = `Attempted Path: ${currentPath}`;
                errorContainer.classList.remove('hidden');
            }
        }

        function renderItems(items) {
            const grid = document.getElementById('file-grid');
            const emptyState = document.getElementById('empty-state');
            grid.innerHTML = '';

            const visibleItems = items.filter(item => {
                const name = item.name.toLowerCase();
                return !(name === 'index.html' || name === 'readme.md' || name.startsWith('.') || name === 'desktop.ini');
            });

            if (visibleItems.length === 0) {
                emptyState.classList.remove('hidden');
                document.getElementById('debug-path').innerText = "All found items were filtered (System/Index files).";
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            visibleItems.sort((a, b) => (a.type === b.type) ? a.name.localeCompare(b.name) : (a.type === 'dir' ? -1 : 1));

            visibleItems.forEach(item => {
                const card = document.createElement('a');
                const ext = item.name.split('.').pop().toLowerCase();
                
                if (item.type === 'dir') {
                    card.href = `./${item.name}/index.html`;
                } else {
                    const pagesBase = `https://${repoOwner}.github.io/${repoName}/`;
                    
                    // Recursive path calculation for direct file access
                    const pathSegments = window.location.pathname.split('/').filter(s => s && s !== 'index.html');
                    const repoIndex = pathSegments.indexOf(repoName);
                    const segments = repoIndex !== -1 ? pathSegments.slice(repoIndex + 1) : [];
                    const fullPath = segments.length > 0 ? segments.join('/') + '/' : '';
                    
                    card.href = pagesBase + fullPath + item.name;
                }

                card.target = "_blank";
                card.className = "glass p-6 rounded-2xl flex flex-col justify-between card-hover border border-white/5 group";
                
                let icon = 'fa-file text-slate-500';
                let typeLabel = 'Resource';
                let accentColor = 'group-hover:text-blue-400';

                if (item.type === 'dir') {
                    icon = 'fa-folder text-blue-500';
                    typeLabel = 'Learning Module';
                    if (item.name.toLowerCase().includes('summary')) icon = 'fa-file-invoice text-blue-400';
                    if (item.name.toLowerCase().includes('sim')) icon = 'fa-atom text-emerald-400';
                    if (item.name.toLowerCase().includes('work')) icon = 'fa-tasks text-orange-400';
                } else if (ext === 'html') {
                    icon = 'fa-play-circle text-emerald-400';
                    typeLabel = 'Simulation';
                    accentColor = 'group-hover:text-emerald-400';
                } else if (ext === 'pdf') {
                    icon = 'fa-file-pdf text-rose-400';
                    typeLabel = 'PDF Study File';
                } else if (['png', 'jpg', 'jpeg', 'svg'].includes(ext)) {
                    icon = 'fa-image text-sky-400';
                    typeLabel = 'Visual Aid';
                }

                const cleanName = sanitize(decodeURIComponent(item.name).replace(/-/g, ' '));

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <i class="fas ${icon} text-2xl"></i>
                            <i class="fas fa-external-link-alt text-[9px] text-slate-600 group-hover:text-white transition"></i>
                        </div>
                        <h4 class="font-bold text-slate-100 ${accentColor} transition line-clamp-2 mb-1 text-sm tracking-tight">${cleanName}</h4>
                        <p class="text-[9px] text-slate-500 uppercase tracking-widest font-black">${typeLabel}</p>
                    </div>
                    <div class="mt-5 pt-4 border-t border-white/5 flex justify-between items-center">
                        <span class="text-[9px] text-slate-600 font-medium">${item.type === 'dir' ? 'Folder' : (item.size / 1024).toFixed(1) + ' KB'}</span>
                        <span class="text-[9px] opacity-0 group-hover:opacity-100 transition duration-300 text-blue-400 font-black uppercase tracking-tighter">View</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = term === '' ? allItems : allItems.filter(item => item.name.toLowerCase().includes(term));
            renderItems(filtered);
        });

        window.addEventListener('DOMContentLoaded', () => loadResources());
    </script>
</body>

</html>
