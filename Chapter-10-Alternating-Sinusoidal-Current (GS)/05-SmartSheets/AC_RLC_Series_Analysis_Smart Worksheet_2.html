<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G12GS: AC RLC Series Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MathJax Configuration to fix LaTeX display issues -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        .dark { background-color: #0f172a; color: #e2e8f0; }
        .card { background: white; border-radius: 12px; padding: 1.75rem; margin-bottom: 1.25rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.025); transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .dark .card { background: #1e293b; color: white; border-color: #334155; }
        .input-box { width: 100%; border: 2px solid #e2e8f0; padding: 0.75rem; border-radius: 8px; font-weight: 600; outline: none; transition: border-color 0.2s; }
        .dark .input-box { background: #0f172a; border-color: #334155; color: white; }
        .input-box:focus { border-color: #3b82f6; }
        .btn-primary { background: #2563eb; color: white; font-weight: 700; padding: 0.75rem 1.5rem; border-radius: 8px; transition: background 0.2s; }
        .btn-primary:hover { background: #1d4ed8; }
        [dir="auto"] { unicode-bidi: plaintext; text-align: start; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen transition-colors duration-300">

    <!-- LOGIN OVERLAY -->
    <div id="login-overlay" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-200 dark:border-slate-700">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-600 text-white mb-4">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h1 class="text-2xl font-black dark:text-white">General Sciences Portal</h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">AC RLC Analysis Module</p>
            </div>
            <div class="space-y-4">
                <input type="password" id="studentCode" placeholder="Enter Access Code" maxlength="4" 
                       class="w-full p-4 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-center text-2xl tracking-[0.5em] focus:ring-2 focus:ring-blue-500 focus:outline-none dark:text-white">
                <button onclick="validateLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]">Verify Identity</button>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto p-4 md:p-10">
        <!-- HEADER -->
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black text-slate-800 dark:text-white">AC RLC Analysis</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="bg-blue-600 text-white text-[10px] font-bold px-2 py-0.5 rounded uppercase">GS-12</span>
                    <p id="student-name" class="text-sm text-slate-500 font-medium" dir="auto">--</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleDarkMode()" class="p-2 bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700">🌓</button>
                <button onclick="window.print()" class="bg-slate-800 text-white text-xs font-bold px-4 py-2 rounded-lg">PDF Site Log</button>
            </div>
        </header>

        <!-- CIRCUIT DATA SECTION -->
        <div class="card">
            <h2 class="text-blue-600 font-black text-xs uppercase tracking-widest mb-4">Initial Circuit Parameters</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                <div class="p-3 bg-slate-50 dark:bg-slate-900 rounded-lg">
                    <span class="block text-slate-400 font-bold uppercase text-[9px]">Inductance</span>
                    <span class="font-bold">L = 0.5 H</span>
                </div>
                <div class="p-3 bg-slate-50 dark:bg-slate-900 rounded-lg">
                    <span class="block text-slate-400 font-bold uppercase text-[9px]">Resistance</span>
                    <span class="font-bold">R = 50 Ω</span>
                </div>
                <div class="p-3 bg-slate-50 dark:bg-slate-900 rounded-lg">
                    <span class="block text-slate-400 font-bold uppercase text-[9px]">Capacitance</span>
                    <span class="font-bold">C = 20 μF</span>
                </div>
                <div class="p-3 bg-slate-50 dark:bg-slate-900 rounded-lg">
                    <span class="block text-slate-400 font-bold uppercase text-[9px]">Source</span>
                    <span class="font-bold">u(t) = 100√2 sin(100πt)</span>
                </div>
            </div>
        </div>

        <!-- WORKSHEET QUESTIONS -->
        <div id="questions-form" class="space-y-4">
            <!-- Questions will be injected here -->
        </div>

        <!-- SUBMIT SECTION -->
        <div class="mt-10 mb-20 flex flex-col items-center gap-4">
            <button onclick="submitWorksheet()" class="bg-blue-600 hover:bg-blue-700 text-white font-black px-12 py-4 rounded-xl shadow-xl shadow-blue-900/20 transition-all active:scale-95">Submit Results to Dashboard</button>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Encrypted Telemetry Protocol 4.0</p>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="hidden fixed bottom-10 right-10 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl z-[200]"></div>

    <script>
        const CONFIG = {
            grade: "Grade 12 GS",
            topic: "AC RLC Series Analysis",
            // UPDATED GS ENDPOINT
            url: "https://script.google.com/macros/s/AKfycbwj8RrPBxo5H9YkyyPJSdKJrN2wagcjsU8l1hkZEVdQHeKRRG-VCcCQNP7RCOt_aiVoSA/exec",
            students: {
                "Teacher": "0000",
                "Tutor": "1111",
                "احمد / محمود / مشحاوي": "7799",
                "هادي / عمر / ابراهيم": "8963"
            }
        };

        const DATA = [
            { id: 1, q: "Calculate the Inductive Reactance $X_L$ in ohms.", a: 157.1 },
            { id: 2, q: "Calculate the Capacitive Reactance $X_C$ in ohms.", a: 159.2 },
            { id: 3, q: "Calculate the total Impedance $Z$ of the circuit in ohms.", a: 50.04 },
            { id: 4, q: "What is the maximum current $I_{max}$ in Amperes?", a: 2.83 },
            { id: 5, q: "Calculate the phase angle $\\phi$ in radians between $u(t)$ and $i(t)$.", a: -0.042 }
        ];

        let currentUser = "";

        function validateLogin() {
            const code = document.getElementById('studentCode').value;
            const student = Object.keys(CONFIG.students).find(k => CONFIG.students[k] === code);
            if (student) {
                currentUser = student;
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('student-name').innerText = student;
                renderQuestions();
            } else {
                showToast("Access Denied: Invalid Code");
                document.getElementById('studentCode').value = '';
            }
        }

        function renderQuestions() {
            const container = document.getElementById('questions-form');
            container.innerHTML = DATA.map(item => `
                <div class="card">
                    <p class="font-bold mb-4 text-lg">${item.q}</p>
                    <input type="number" step="0.01" id="q-${item.id}" placeholder="Enter result..." class="input-box">
                </div>
            `).join('');
            if (window.MathJax) MathJax.typeset();
        }

        async function submitWorksheet() {
            let score = 0;
            let detail = [];
            
            DATA.forEach(item => {
                const val = parseFloat(document.getElementById(`q-${item.id}`).value);
                // Allow 2% tolerance for rounding variations in PI
                const isCorrect = Math.abs(val - item.a) <= Math.abs(item.a * 0.02) || (item.a === 0 && Math.abs(val) < 0.05);
                
                if (isCorrect) score++;
                detail.push(`Q${item.id}: ${isCorrect ? 'Correct' : 'Incorrect'} (${val || 'NaN'})`);
            });

            const percent = Math.round((score / DATA.length) * 100);
            showToast(`Submitting... Final Score: ${percent}%`);

            const payload = {
                name: currentUser,
                score: percent,
                topic: CONFIG.topic,
                answers: detail.join(", ")
            };

            try {
                // Submit to Grade 12 GS endpoint
                await fetch(CONFIG.url, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                showToast(`Success! Recorded ${percent}% for ${currentUser}`);
            } catch (e) {
                console.error(e);
                showToast("Network Error: Data logged locally only.");
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 4000);
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
</body>
</html>
